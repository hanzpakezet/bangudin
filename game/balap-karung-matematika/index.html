<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tarik Tambang Matematika</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:'Fredoka',sans-serif;
  background:linear-gradient(135deg,#f8f9fa,#dee2e6);
  margin:0;

  height:100vh;          /* kunci utama */
  display:flex;
  flex-direction:column;
  overflow:hidden;       /* hilangkan scroll */
}

.main{
  flex:1;                 /* isi ruang */
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* TITLE */
h1{
  margin:15px 0 5px;
  text-align: center;
  background:linear-gradient(to right,#3a86ff,#ff006e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* AREA */
.tug{
  position:relative;
  height:140px;
  width:100%;
  overflow:hidden;
}

/* GROUP YANG GERAK */
#game-area{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  gap: 0;
  transition:0.15s linear;
  will-change: transform;
}

/* PLAYER */
.player{
  width:70px;
  position: relative;
  z-index: 2;
}

/* biru masuk ke rope */
.left-player{
  margin-right:-10px;
}

/* merah masuk ke rope */
.right-player{
  margin-left:-10px;
  transform:scaleX(-1);
}

/* ROPE */
#rope{
  width:300px; /* 🔥 panjang rope */
  height:10px;
  background:#c19a6b;
  position:relative;
  border-radius:5px;
  top: 15px;
}

/* MARKER */
#marker{
  position:absolute;
  left:46%;
  top:-6px;
  width:18px;
  height:18px;
  background:gold;
  border-radius:20%;
  transform:translateX(-50%);
}

.player, #rope, #marker{
  will-change: transform;
  transform: translateZ(0);
}

/* CENTER LINE */
#center-line{
  position:absolute;
  left:50%;
  top: 25%;
  height:60%;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.3;
}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  margin:10px;
  display:inline-block;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:100%;
  max-width:320px;
  text-align: center;
}

/* HEADER */
.header{
  color:white;
  font-size:30px;
  font-weight:bold;
  padding:20px;
  text-align: center;
}

.blue{ background:#3b82f6; }
.red{ background:#ff006e; }

/* BODY */
.body{
  padding:15px;
}

.answer{
  background:#eee;
  padding:20px;
  border-radius:12px;
  margin:15px 0;
  border:2px solid transparent;
  transition:0.3s;

  font-size:28px;       /* biar gede */
  height:20px;      /* ini kunci: tinggi */
  display:flex;
  align-items:center;
  justify-content:center;
  overflow: hidden;
}

/* KEYPAD */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}

.keypad button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.ok{background:#00ff88;}
.del{background:#ff4d4d;color:white;}

.win{
  position:fixed;
  inset:0;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wrapper{
  display:flex;
  justify-content:space-between; /* ini kunci */
  align-items:flex-start;
  padding:0 10px; /* jarak dari tepi layar */
  margin:20px auto;
  flex-wrap:wrap;
  width: 100%;
  max-width: 1200px;
  gap: 40px; /* jarak antar card */
}

@media (max-width: 768px){
  .wrapper{
    flex-direction:column;
    align-items:center;
    gap:20px;
  }
}

.subtitle{
  font-family:'Open Sans', sans-serif;
  color:#000;
  margin: 0 0 10px;
  font-size:16px;
  opacity: 0.7;
  text-align: center;
}

@media (max-height: 700px){
  .tug{
    height:110px;
  }

  .char{
    font-size:35px;
  }
}

.footer{
  padding:5px 0;          /* kecilin tinggi */
  font-size:14px;         /* tetap */
  color:#666;
  text-align:center;
}

/* POPUP OVERLAY */
.start-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* BOX */
.popup-box{
  background:white;
  padding:30px 40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* TEXT */
.popup-box h2{
  margin-bottom:20px;
  font-family:'Open Sans', sans-serif;
}

/* BUTTON */
.popup-box button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#3a86ff;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.popup-box button:hover{
  transform:scale(1.05);
}

/* WIN SCREEN */
.win{
  position:fixed;
  inset:0;
  background:rgba(0, 0, 0, 0.9); /* 🔥 hitam transparan */
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.win.show{
  display:flex;
}

/* TEXT */
#winText{
  color:white;
  font-size:40px;
  margin-bottom:20px;
  text-align:center;
  animation:pop 0.4s ease;
}

/* BUTTON */
.win button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  cursor:pointer;
}

@keyframes pop{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* animasi dasar */
.countdown{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  color:white;
  font-size:80px;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-family:'Fredoka', sans-serif;
  transition:0.2s;
}

/* zoom masuk */
@keyframes zoomPop{
  0%{ transform:scale(0.5); opacity:0; }
  50%{ transform:scale(1.2); }
  100%{ transform:scale(1); opacity:1; }
}

/* GO efek besar */
.go{
  color:#00ff88 !important;
  animation:goBoom 0.5s ease;
}

@keyframes goBoom{
  0%{ transform:scale(0.5); }
  50%{ transform:scale(1.5); }
  100%{ transform:scale(1); }
}

/* screen shake */
@keyframes shake{
  0%{ transform:translate(0,0); }
  25%{ transform:translate(5px,-5px); }
  50%{ transform:translate(-5px,5px); }
  75%{ transform:translate(5px,5px); }
  100%{ transform:translate(0,0); }
}

.mode-title{
  margin-bottom:10px;
  font-size:22px;
  background:linear-gradient(to right,#3a86ff,#ff006e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.mode-list{
  display:grid;
  grid-template-columns:repeat(5,1fr); /* 🔥 5 kolom */
  gap:12px;
  margin-top:20px;
}

.mode-list button{
  background:#f1f1f1;
  border:none;
  border-radius:12px;
  padding:12px;
  cursor:pointer;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  font-family:'Open Sans', sans-serif;
  font-size:13px;
  transition:0.2s;
  color: #222;
}

.mode-list button:hover{
  background:#3a86ff;
  color:white;
  transform:scale(1.05);
}

.mode-list .icon{
  font-size:22px;
  margin-bottom:5px;
}

.mode-popup{
  background:white !important;
}

.mode-popup .popup-box{
  color:#222; /* 🔥 teks jadi hitam */
}

.mode-popup,
.mode-popup *{
  color:#222 !important;
}

@media (max-width: 768px){
  .mode-list{
    grid-template-columns:repeat(3,1fr);
  }
}

@media (max-width: 480px){
  .mode-list{
    grid-template-columns:repeat(2,1fr);
  }
}

.credit{
  margin-top:20px;
  font-size:13px;
  color:#555;
  font-family:'Open Sans', sans-serif;
}

  /* =========================
   BALAP KARUNG STYLE
========================= */

.track{
  position:absolute;
  width:90%;
  height:100px;

  /* warna hijau tua */
  background:#2e7d32;

  border-radius:20px;
  left:50%;
  transform:translateX(-50%);
  bottom:20px;

  /* garis tengah */
  overflow:hidden;
}

/* garis lintasan */
.track::before{
  content:"";
  position:absolute;
  top:50%;
  width:100%;
  height:4px;

  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 20px,
    transparent 20px,
    transparent 40px
  );

  transform:translateY(-50%);
}

.finish{
  position:absolute;
  right:5%;
  width:10px;
  height:100px;
  background:red;
}

.runner{
  position:absolute;
  width:70px;
  left:5%;
  transition:0.2s;
}

/* posisi beda jalur */
.blue-runner{
  bottom:70px;
}

.red-runner{
  bottom:10px;
}

/* efek lompat */
@keyframes jumpAnim{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-25px); }
  100%{ transform:translateY(0); }
}

</style>
</head>

<div id="start-popup" class="start-popup" style="display:none;">
  <div class="popup-box">
    <h2>Sudah siap memulai ?</h2>

  </div>

<div id="countdown" class="countdown">3</div>

<script>

let gameMode = "tambah";

function selectMode(mode){
  gameMode = mode;

  // tutup mode popup
  document.getElementById("mode-popup").style.display = "none";

  // tampilkan popup GAS
  document.getElementById("start-popup").style.display = "flex";
}

function startCountdown(){
  let sequence = ["3", "2", "1", "GO...!!!"];
  let index = 0;
  let el = document.getElementById("countdown");

  el.style.display = "flex";
  el.textContent = sequence[index];
  el.style.animation = "zoomPop 0.4s";

  let interval = setInterval(()=>{
    index++;

    if(index < sequence.length){

      el.textContent = sequence[index];
      el.classList.remove("go");
      el.style.animation = "zoomPop 0.4s";

      // 🔥 khusus GO
      if(sequence[index] === "GO...!!!"){
        el.classList.add("go");

        // screen shake
        document.body.style.animation = "shake 0.3s";
        setTimeout(()=>document.body.style.animation="",300);

        // karakter "siap narik"
        let players = document.querySelectorAll(".player");
        players.forEach(p=>{
          p.style.transform = p.classList.contains("right-player")
            ? "scaleX(-1) scale(1.1)"
            : "scale(1.1)";
          setTimeout(()=>p.style.transform = p.classList.contains("right-player")
            ? "scaleX(-1)"
            : "",200);
        });
      }

    } else {
      clearInterval(interval);
      el.style.display = "none";
      initGame();
    }

  }, 1000);
}

function startGame(){
  document.getElementById("start-popup").style.display = "none";
  startCountdown();
}

let pos=50;

function gcd(a,b){
  while(b!==0){
    let t=b;
    b=a%b;
    a=t;
  }
  return a;
}

function lcm(a,b){
  return (a*b)/gcd(a,b);
}

function gen(){
  let a = Math.floor(Math.random()*10)+1;
  let b = Math.floor(Math.random()*10)+1;

  switch(gameMode){

    case "tambah":
      return {q:`${a} + ${b} = ?`, a:a+b};

    case "kurang":
      if(a < b){ [a,b] = [b,a]; }
      return {q:`${a} - ${b} = ?`, a:a-b};

    case "kali":
      return {q:`${a} × ${b} = ?`, a:a*b};

    case "bagi":
      let hasil = Math.floor(Math.random()*10)+1;
      let pembagi = Math.floor(Math.random()*10)+1;
      return {q:`${hasil*pembagi} ÷ ${pembagi} = ?`, a:hasil};

    case "campur1":
      if(Math.random() > 0.5){
        return {q:`${a} + ${b} = ?`, a:a+b};
      } else {
        if(a < b){ [a,b] = [b,a]; }
        return {q:`${a} - ${b} = ?`, a:a-b};
      }

    case "campur2":
      if(Math.random() > 0.5){
        return {q:`${a} × ${b} = ?`, a:a*b};
      } else {
        let h = Math.floor(Math.random()*10)+1;
        let p = Math.floor(Math.random()*10)+1;
        return {q:`${h*p} ÷ ${p} = ?`, a:h};
      }

    case "pangkat2":
      let x = Math.floor(Math.random()*10)+1;
      return {q:`${x}² = ?`, a:x*x};

    case "akar2":
      let n = Math.floor(Math.random()*10)+1;
      return {q:`√${n*n} = ?`, a:n};

    case "pangkat3":
      let p3 = Math.floor(Math.random()*5)+1;
      return {q:`${p3}³ = ?`, a:p3*p3*p3};

    case "akar3":
      let c = Math.floor(Math.random()*5)+1;
      return {q:`∛${c*c*c} = ?`, a:c};

    case "kpk":
      let a1 = Math.floor(Math.random()*10)+1;
      let b1 = Math.floor(Math.random()*10)+1;
      return {q:`KPK dari ${a1} dan ${b1} = ?`, a:lcm(a1,b1)};

    case "fpb":
      let a2 = Math.floor(Math.random()*20)+1;
      let b2 = Math.floor(Math.random()*20)+1;
      return {q:`FPB dari ${a2} dan ${b2} = ?`, a:gcd(a2,b2)};

    case "persen":
      let pembilang = Math.floor(Math.random()*10)+1;
      let penyebut = pembilang * (Math.floor(Math.random()*5)+1);
      return {
        q:`${pembilang}/${penyebut} = ? %`,
        a:(pembilang/penyebut)*100
      };

    case "waktu":
      let menit = Math.floor(Math.random()*60)+1;
      return {q:`${menit} menit = ? detik`, a:menit*60};

    case "panjang":
      let meter = Math.floor(Math.random()*10)+1;
      return {q:`${meter} m = ? cm`, a:meter*100};

    case "luas":
      let sisi = Math.floor(Math.random()*10)+1;
      return {q:`Luas persegi sisi ${sisi} = ?`, a:sisi*sisi};

    case "kubik":
      let s = Math.floor(Math.random()*5)+1;
      return {q:`Volume kubus sisi ${s} = ?`, a:s*s*s};

    default:
      return {q:`${a} + ${b} = ?`, a:a+b};
  }
}

let bQ=gen();
let rQ=gen();

// qB.innerText=bQ.q;
// qR.innerText=rQ.q;

function initGame(){
  bQ = gen();
  rQ = gen();

  qB.textContent = bQ.q;
  qR.textContent = rQ.q;

  bluePos = 0;
redPos = 0;

document.getElementById("blueRunner").style.left = "5%";
document.getElementById("redRunner").style.left = "5%";
}

let step = 0;        // posisi sekarang
const maxStep = 5;   // batas menang

let pending = false;

let bluePos = 0;
let redPos = 0;

function move(team){
  if(pending) return;
  pending = true;

  requestAnimationFrame(()=>{

    if(team === "blue"){
      bluePos++;

      let percent = (bluePos / maxStep) * 80;
      let el = document.getElementById("blueRunner");

      el.style.left = percent + "%";
      el.style.animation = "jumpAnim 0.25s";

      if(bluePos >= maxStep) win("Biru");

    } else {

      redPos++;

      let percent = (redPos / maxStep) * 80;
      let el = document.getElementById("redRunner");

      el.style.left = percent + "%";
      el.style.animation = "jumpAnim 0.25s";

      if(redPos >= maxStep) win("Merah");
    }

    setTimeout(()=>{
      document.getElementById("blueRunner").style.animation="";
      document.getElementById("redRunner").style.animation="";
    },200);

    pending = false;
  });
}

function add(id,n){
  let el = id==="kB"?aB:aR;
  el.textContent = el.textContent + n; // 🔥 tanpa delay
}

function del(id){
  let el=id==="kB"?aB:aR;
  el.textContent=el.textContent.slice(0,-1);
}

function check(id,team){
  let el=id==="kB"?aB:aR;
  let val=parseInt(el.textContent);

  let correctAnswer = team==="blue" ? bQ.a : rQ.a;

  el.style.border="2px solid transparent";

  if(val===correctAnswer){
    el.style.border="2px solid limegreen";

    move(team);

    let newQ = gen();

    if(team==="blue"){
      bQ = newQ;
      qB.textContent = bQ.q;
    } else {
      rQ = newQ;
      qR.textContent = rQ.q;
    }

  } else {
    el.style.border="2px solid red";
  }

  setTimeout(()=>{
    el.style.border="2px solid transparent";
  },200);

  el.textContent="";
}

function keypad(id,obj,team){
  let el=document.getElementById(id);

  for(let i=1;i<=9;i++){
    let b=document.createElement("button");
    b.textContent=i;
    b.onclick=()=>add(id,i);
    el.appendChild(b);
  }

  let delBtn=document.createElement("button");
  delBtn.textContent="⌫";
  delBtn.className="del";
  delBtn.onclick=()=>del(id);
  el.appendChild(delBtn);

  let zero=document.createElement("button");
  zero.textContent="0";
  zero.onclick=()=>add(id,0);
  el.appendChild(zero);

  let ok=document.createElement("button");
  ok.textContent="OK";
  ok.className="ok";
  ok.onclick=()=>check(id,team);
  el.appendChild(ok);
}

function win(name){
  document.getElementById("winText").textContent =
    "TIM " + name.toUpperCase() + " MENANG !!!!";

  document.getElementById("win").classList.add("show");

  // 🎉 CONFETTI
  confetti({
    particleCount: 60,
    spread: 60,
    origin: { y: 0.6 }
  });
}

keypad("kB",bQ,"blue");
keypad("kR",rQ,"red");
</script>
