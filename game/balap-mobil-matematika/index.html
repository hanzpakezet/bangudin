<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Baloo+2:wght@500;700;800&amp;display=swap" rel="stylesheet">
  <style>
  html, body { height: 100%; margin: 0; overflow-x: hidden; }
  body {
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
  }
  .app-wrapper {
    width: 100%; min-height: 100%; overflow: auto;
    background: repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(255,255,255,0.02) 48px, rgba(255,255,255,0.02) 50px);
  }
  .game-title {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 2.2rem;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    letter-spacing: 1px;
  }
  .team-card {
    border-radius: 20px;
    border: 3px solid;
    position: relative;
    overflow: hidden;
  }
  .team-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  }
  .team-blue { border-color: #4fc3f7; background: linear-gradient(180deg, rgba(13,71,161,0.7) 0%, rgba(21,101,192,0.5) 100%); }
  .team-red { border-color: #ef5350; background: linear-gradient(180deg, rgba(183,28,28,0.7) 0%, rgba(198,40,40,0.5) 100%); }

  /* Race Track */
  .race-track {
    background: #2d2d2d;
    border-radius: 12px;
    height: 70px;
    position: relative;
    overflow: hidden;
    border: 2px solid #444;
    margin: 8px 0;
  }
  .track-lines {
    position: absolute; top: 50%; left: 0; right: 0; height: 2px;
    background: repeating-linear-gradient(90deg, #666, #666 20px, transparent 20px, transparent 40px);
    transform: translateY(-50%);
  }
  .finish-line {
    position: absolute; right: 8px; top: 4px; bottom: 4px; width: 16px;
    border-radius: 4px;
    background: repeating-conic-gradient(#fff 0% 25%, #111 0% 50%) 0 0 / 8px 8px;
    z-index: 2;
  }
  .car-container {
    position: absolute; top: 50%; transform: translateY(-50%);
    left: 8px; z-index: 3;
    transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Question */
  .question-display {
    font-family: 'Baloo 2', cursive;
    font-size: 2.5rem;
    font-weight: 800;
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }
  .answer-screen {
    background: #111;
    border-radius: 10px;
    min-height: 48px;
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #333;
    color: #0f0;
    letter-spacing: 3px;
    min-width: 80px;
  }
  .feedback-msg {
    min-height: 32px;
    font-size: 1rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    transition: all 0.3s;
  }
  .feedback-correct { background: rgba(76,175,80,0.3); color: #69f0ae; }
  .feedback-wrong { background: rgba(244,67,54,0.3); color: #ff8a80; }

  /* Keypad */
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-width: 240px; margin: 0 auto; }
  .key-btn {
    border: none; border-radius: 12px; padding: 10px 0;
    font-family: 'Fredoka', sans-serif; font-size: 1.3rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    color: #fff;
  }
  .key-btn:active { transform: scale(0.92); }
  .key-num { background: rgba(255,255,255,0.15); }
  .key-num:hover { background: rgba(255,255,255,0.25); }
  .key-del { background: #ff7043; }
  .key-del:hover { background: #ff5722; }
  .key-ok-blue { background: #29b6f6; }
  .key-ok-blue:hover { background: #03a9f4; }
  .key-ok-red { background: #ef5350; }
  .key-ok-red:hover { background: #e53935; }

  .score-badge {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 20px;
  }
  .score-blue { background: rgba(41,182,246,0.3); color: #81d4fa; }
  .score-red { background: rgba(239,83,80,0.3); color: #ef9a9a; }

  /* Win overlay */
  .win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center; align-items: center;
    flex-direction: column;
  }
  .win-overlay.active { display: flex; }
  .win-title {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem; font-weight: 800;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    animation: winBounce 0.6s ease;
  }
  @keyframes winBounce {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .win-emoji { font-size: 4rem; animation: winBounce 0.6s ease 0.2s both; }
  .restart-btn {
    margin-top: 20px; padding: 12px 40px;
    font-family: 'Fredoka', sans-serif; font-size: 1.2rem; font-weight: 600;
    border: none; border-radius: 50px; cursor: pointer;
    background: linear-gradient(135deg, #ffd54f, #ffb300);
    color: #333; animation: winBounce 0.6s ease 0.4s both;
    transition: transform 0.15s;
  }
  .restart-btn:hover { transform: scale(1.05); }

  /* Car SVG */
  .car-svg { width: 54px; height: 30px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5)); }

  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0) translateY(-50%); }
    25% { transform: translateX(-6px) translateY(-50%); }
    75% { transform: translateX(6px) translateY(-50%); }
  }

  /* Ready Dialog */
  .ready-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 101;
    justify-content: center; align-items: center;
  }
  .ready-overlay.active { display: flex; }
  .ready-box {
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: readyPop 0.5s ease;
  }
  @keyframes readyPop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .ready-text {
    font-family: 'Baloo 2', cursive;
    font-size: 1.8rem;
    font-weight: 700;
    color: #333;
    margin-bottom: 30px;
  }
  .ready-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 50px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 4px 15px rgba(255,107,107,0.3);
  }
  .ready-btn:hover { transform: scale(1.08); }
  .ready-btn:active { transform: scale(0.95); }

  /* Fullscreen Controls */
  .fullscreen-controls {
    position: fixed;
    top: 16px;
    left: 16px;
    right: 16px;
    z-index: 102;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .fullscreen-controls.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Fullscreen mode adjustments */
  :fullscreen .team-card,
  :-webkit-full-screen .team-card,
  :-moz-full-screen .team-card,
  :-ms-fullscreen .team-card {
    min-height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
  }

  :fullscreen .keypad,
  :-webkit-full-screen .keypad,
  :-moz-full-screen .keypad,
  :-ms-fullscreen .keypad {
    margin-top: auto;
  }
  .control-btn {
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid #fff;
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .control-btn:hover {
    background: rgba(0, 0, 0, 0.7);
    transform: scale(1.1);
  }
  .control-btn:active {
    transform: scale(0.95);
  }

  @media (max-width: 768px) {
    .game-title { font-size: 1.5rem; }
    .question-display { font-size: 1.8rem; }
    .answer-screen { font-size: 1.5rem; min-height: 40px; }
    .key-btn { font-size: 1.1rem; padding: 8px 0; }
    .race-track { height: 56px; }
    .car-svg { width: 40px; height: 22px; }
  }
  </style>

  <script>
// ==================== GAME STATE ====================
const STEPS_TO_WIN = 8;
const state = {
  blue: { score: 0, answer: '', question: null, processing: false },
  red: { score: 0, answer: '', question: null, processing: false },
  gameOver: false
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type='square') {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playCorrectSound() { playSound(523, 0.1); setTimeout(() => playSound(659, 0.1), 100); setTimeout(() => playSound(784, 0.15), 200); }
function playWrongSound() { playSound(200, 0.2, 'sawtooth'); }
function playWinSound() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playSound(f, 0.2, 'square'), i*150)); }

// ==================== QUESTION GENERATOR ====================
function generateQuestion() {
  const isAdd = Math.random() > 0.4;
  let a, b, op, answer;
  if (isAdd) {
    a = Math.floor(Math.random() * 15) + 1;
    b = Math.floor(Math.random() * (20 - a)) + 1;
    op = '+'; answer = a + b;
  } else {
    a = Math.floor(Math.random() * 16) + 5;
    b = Math.floor(Math.random() * a) + 1;
    op = '−'; answer = a - b;
  }
  return { text: `${a} ${op} ${b} = ?`, answer };
}

function newQuestion(team) {
  const q = generateQuestion();
  state[team].question = q;
  state[team].answer = '';
  document.getElementById(team + 'Question').textContent = q.text;
  document.getElementById(team + 'Answer').innerHTML = '&nbsp;';
  document.getElementById(team + 'Feedback').textContent = '';
  document.getElementById(team + 'Feedback').className = 'feedback-msg mb-2';
}

// ==================== KEYPAD ====================
function pressKey(team, key) {
  if (state.gameOver) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const s = state[team];
  const ansEl = document.getElementById(team + 'Answer');

  if (key === 'del') {
    s.answer = s.answer.slice(0, -1);
    ansEl.textContent = s.answer || '\u00A0';
    return;
  }

  if (key === 'ok') {
    checkAnswer(team);
    return;
  }

  // Max 2 digits
  if (s.answer.length >= 2) return;
  s.answer += key;
  ansEl.textContent = s.answer;
}

function checkAnswer(team) {
  const s = state[team];
  if (!s.answer || s.processing) return;

  s.processing = true;

  const fb = document.getElementById(team + 'Feedback');
  const carEl = document.getElementById(team + 'Car');

  if (parseInt(s.answer) === s.question.answer) {
    // Correct!
    s.score++;
    playCorrectSound();
    fb.textContent = '✅ Benar! Hebat!';
    fb.className = 'feedback-msg mb-2 feedback-correct';
    document.getElementById(team + 'Score').textContent = 'Skor: ' + s.score;

    // Move car
    const track = document.getElementById(team + 'Track');
    const maxLeft = track.offsetWidth - 78;
    const step = maxLeft / STEPS_TO_WIN;
    const newLeft = Math.min(8 + s.score * step, maxLeft);
    carEl.style.left = newLeft + 'px';

    // Check win
    if (s.score >= STEPS_TO_WIN) {
      state.gameOver = true;
      setTimeout(() => showWin(team), 400);
      return;
    }

    setTimeout(() => {
      s.processing = false;
      newQuestion(team);
    }, 600);
  } else {
    // Wrong
    playWrongSound();
    fb.textContent = '❌ Coba lagi!';
    fb.className = 'feedback-msg mb-2 feedback-wrong';
    carEl.classList.add('shake');
    setTimeout(() => carEl.classList.remove('shake'), 400);
    s.answer = '';
    document.getElementById(team + 'Answer').innerHTML = '&nbsp;';
    s.processing = false;
  }
}

// ==================== WIN ====================
function showWin(team) {
  playWinSound();
  const overlay = document.getElementById('winOverlay');
  const title = document.getElementById('winTitle');
  const emoji = document.getElementById('winEmoji');

  const name = team === 'blue'
    ? (document.getElementById('blueTeamLabel').textContent)
    : (document.getElementById('redTeamLabel').textContent);

  title.textContent = name + ' Menang!';
  title.style.color = team === 'blue' ? '#64b5f6' : '#ef9a9a';
  emoji.textContent = '🏆🎉🏆';
  overlay.classList.add('active');
}

function restartGame() {
  state.blue.score = 0; state.red.score = 0;
  state.gameOver = false;
  state.blue.processing = false;
  state.red.processing = false;
  document.getElementById('blueCar').style.left = '8px';
  document.getElementById('redCar').style.left = '8px';
  document.getElementById('blueScore').textContent = 'Skor: 0';
  document.getElementById('redScore').textContent = 'Skor: 0';
  document.getElementById('winOverlay').classList.remove('active');
  newQuestion('blue');
  newQuestion('red');
}

// ==================== ELEMENT SDK ====================
const defaultConfig = {
  game_title: '🏁 Game Balap Matematika 🏁',
  blue_team_name: '🔵 Tim Biru',
  red_team_name: '🔴 Tim Merah',
  background_color: '#1a1a2e',
  surface_color: '#0d47a1',
  text_color: '#ffffff',
  primary_action_color: '#29b6f6',
  secondary_action_color: '#ef5350',
  font_family: 'Fredoka',
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('gameTitle').textContent = c.game_title;
  document.getElementById('blueTeamLabel').textContent = c.blue_team_name;
  document.getElementById('redTeamLabel').textContent = c.red_team_name;

  document.body.style.fontFamily = `${c.font_family}, Fredoka, sans-serif`;
  document.body.style.color = c.text_color;

  wrapper.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.surface_color} 100%)`;

  document.querySelectorAll('.key-ok-blue').forEach(b => b.style.background = c.primary_action_color);
  document.querySelectorAll('.key-ok-red').forEach(b => b.style.background = c.secondary_action_color);

  const base = c.font_size || 16;
  document.querySelectorAll('.game-title').forEach(el => el.style.fontSize = `${base * 2.2 / 16}rem`);

function startGame() {
  document.getElementById('readyOverlay').classList.remove('active');
  enterFullscreen();
  newQuestion('blue');
  newQuestion('red');
}

function enterFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen().catch(err => console.log('Fullscreen request failed:', err));
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.mozRequestFullScreen) {
    elem.mozRequestFullScreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
  document.getElementById('fullscreenControls').classList.add('active');
}

function exitFullscreen() {
  if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.mozCancelFullScreen) {
      document.mozCancelFullScreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  }
  document.getElementById('fullscreenControls').classList.remove('active');
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.getElementById('fullscreenControls').classList.remove('active');
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) {
    document.getElementById('fullscreenControls').classList.remove('active');
  }
});
document.addEventListener('mozfullscreenchange', () => {
  if (!document.mozFullScreenElement) {
    document.getElementById('fullscreenControls').classList.remove('active');
  }
});
