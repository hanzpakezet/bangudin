<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Edukasi Battle</title>

<style>

/* overlay awal */
#startScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 10;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* container box */
#boxContainer {
  display: grid;
  grid-template-columns: repeat(5, 90px);
  gap: 25px; /* ini yang bikin jarak jauh */
  margin-top: 30px;
}

/* box */
.box {
  width: 90px;
  height: 90px;
  background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 15px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: bold;
  font-size: 18px;
  color: white;

  cursor: pointer;
  transition: all 0.2s ease;
}

/* hover effect */
.box:hover {
  transform: scale(1.08);
  border-color: white;
  background: linear-gradient(145deg, #3a3a3a, #222);
}

/* klik effect */
.box:active {
  transform: scale(0.95);
}

/* story */
#storyBox {
  margin-top: 20px;
  max-width: 500px;
  text-align: center;
}

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* VIDEO DEFAULT DESKTOP */
#video1,
#video2 {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* UI LAYER */
#gameUI {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* HP */
.hp-container {
  width: 80%;
  margin: 10px auto;
}

.hp-bar {
  height: 20px;
  background: limegreen;
  border-radius: 5px;
  transition: width 0.5s;
}

/* QUIZ PANEL */
#quizBox {
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 20px 0;
  border-top: 2px solid white;

  text-align: center; /* ini kuncinya */
}

#question {
  text-align: center;
  font-size: 18px;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

#answers {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

#answers button {
  width: 200px;
  min-width: 120px;
}

/* FEEDBACK */
#feedback {
  margin-top: 10px;
  font-weight: bold;
}

/* BOX (wadah HP) */
.hp-box {
  width: 100%;
  height: 28px; /* lebih tebal */
  border: 2px solid white;
  border-radius: 6px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
}

/* FILL (isi HP) */
.hp-fill {
  height: 100%;
  transition: width 0.4s;
}

/* PLAYER (kiri) */
.hp-fill.player {
  background: limegreen;
  width: 100%;
}

/* MONSTER (kanan) */
.hp-fill.monster {
  background: limegreen;
  width: 100%;
  margin-left: auto; /* ini bikin dia nempel kanan */
}

.hp-fill.low {
  background: orange;
}

.hp-fill.critical {
  background: red;
animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

/* overlay gelap */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 5;
}

/* popup box */
#popupBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: #111;
  padding: 30px;
  border-radius: 10px;
  text-align: center;

  z-index: 6;
}

#popupBox button {
  margin-top: 15px;
  padding: 10px 20px;
}

/* =========================
   MOBILE LAYOUT FIX
========================= */
@media screen and (max-width: 768px) {

  html,
  body {
    overflow-y: auto;
    overflow-x: hidden;
    height: auto;
    background: black;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* VIDEO AREA */
  #video1,
  #video2 {

    position: relative !important;

    width: 100% !important;

    height: 250px !important;

    object-fit: contain !important;

    background: black;

    top: unset !important;
    left: unset !important;
  }

  /* UI */
  #gameUI {

    position: relative !important;

    display: flex;
    flex-direction: column;

    height: auto !important;
  }

  /* HP */
  .wrapper {

    position: absolute;

    top: 0;

    width: 100%;

    z-index: 5;
  }

  /* QUIZ */
  #quizBox {

    position: relative !important;

    width: 100%;

    background: rgba(0,0,0,0.95);

    box-sizing: border-box;

    padding: 20px;

    margin-top: 0;
  }

  /* QUESTION */
  #question {

    font-size: 16px;

    line-height: 1.5;

    text-align: center;
  }

  /* ANSWERS */
  #answers {

    display: flex;

    flex-direction: column;

    gap: 10px;

    margin-top: 20px;
  }

  /* BUTTON */
  #answers button {

    width: 100%;

    margin: 0;

    padding: 14px;

    font-size: 16px;
  }

}

</style>
</head>

<body>

</div>

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

let selectedStory = null;

let shuffledStories = [];

function createBoxes() {
  const container = document.getElementById("boxContainer");
  container.innerHTML = "";

  // shuffle cerita
  shuffledStories = [...stories];
  shuffleArray(shuffledStories);

  for (let i = 0; i < 10; i++) {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = i + 1;

    div.onclick = () => {

      // ambil random langsung
      let randomIndex = Math.floor(Math.random() * shuffledStories.length);
      selectedStory = shuffledStories[randomIndex];

      container.style.display = "none";

      document.querySelector("#startScreen h2").innerText = "Baca petunjuk berikut";

      document.getElementById("storyText").innerText = selectedStory.text;
      document.getElementById("storyBox").style.display = "block";
    };

    container.appendChild(div);
  }
}

// ================= VIDEO =================
let activeVideo = document.getElementById("video1");
let nextVideo = document.getElementById("video2");

function switchVideo(src, loop=false, speed=1, callback=null) {

  // siapkan video berikutnya
  nextVideo.src = src;
  nextVideo.loop = loop;

  nextVideo.onloadeddata = () => {
    nextVideo.playbackRate = speed;
    nextVideo.play();

    // tampilkan video baru
    nextVideo.style.display = "block";
    activeVideo.style.display = "none";

    // swap
    let temp = activeVideo;
    activeVideo = nextVideo;
    nextVideo = temp;

    if (callback) {
      activeVideo.onended = () => {
        activeVideo.onended = null;
        callback();
      };
    }
  };
}

// ================= HP =================
function updateHP() {

  let playerBar = document.getElementById("hpPlayer");
  let monsterBar = document.getElementById("hpMonster");

  // reset class dulu (biar nggak numpuk)
  playerBar.classList.remove("low", "critical");
  monsterBar.classList.remove("low", "critical");

  // update width
  playerBar.style.width = hpPlayer + "%";
  monsterBar.style.width = hpMonster + "%";

  // update text
  document.getElementById("hpPlayerText").innerText = hpPlayer;
  document.getElementById("hpMonsterText").innerText = hpMonster;

  // PLAYER warna
  if (hpPlayer < 50) playerBar.classList.add("low");
  if (hpPlayer < 20) playerBar.classList.add("critical");

  // MONSTER warna
  if (hpMonster < 50) monsterBar.classList.add("low");
  if (hpMonster < 20) monsterBar.classList.add("critical");
}

// ================= LOAD =================
function loadQuestion() {
  if (currentQuestion >= questions.length) return;

  let q = questions[currentQuestion];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.a.forEach((ans, i) => {
    html += `<button onclick="answer(${i})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.querySelectorAll("#answers button").forEach(btn => {
    btn.disabled = false;
  });
}

// ================= ANSWER =================
function answer(index) {
  // kalau sedang proses, blok
  if (isAnswering) return;
  isAnswering = true;
  document.querySelectorAll("#answers button").forEach(btn => {
    btn.disabled = true;
  });
  let q = questions[currentQuestion];
  if (index === q.correct) {
    if (hpMonster <= 20) {
      hpMonster = 0;
      updateHP();

      switchVideo("monster_mati.mp4", false, 1.2, () => {
        showGameOver("Kamu Menang!");
      });

      return;
    }

    hpMonster -= 20;
    updateHP();

    switchVideo("tentara_serang.mp4", false, 2.5, () => {
      isAnswering = false; // buka lagi
      cekGame();
    });

  } else {

    if (hpPlayer <= 20) {
      hpPlayer = 0;
      updateHP();

      switchVideo("tentara_mati.mp4", false, 1.2, () => {
        showGameOver("Kamu Kalah!");
      });

      return;
    }

    hpPlayer -= 20;
    updateHP();

    switchVideo("monster_serang.mp4", false, 2.5, () => {
      isAnswering = false; // buka lagi
      cekGame();
    });
  }
}

// ================= CHECK =================
function cekGame() {

  if (hpMonster <= 0) {
    switchVideo("monster_mati.mp4", false, 1.2);
    showGameOver("Kamu Menang!");
    return;
  }

  if (hpPlayer <= 0) {
    switchVideo("tentara_mati.mp4");
    showGameOver("Kamu Kalah!");
    return;
  }

  currentQuestion++;
  loadQuestion();

  switchVideo("efek_diam.mp4", true, 1);
}

function showGameOver(text) {
  document.getElementById("resultText").innerText = text;
  document.getElementById("gameOver").style.display = "block";
}

function restartGame() {
  hpPlayer = 100;
  hpMonster = 100;
  currentQuestion = 0;

  questions.sort(() => Math.random() - 0.5);

  document.getElementById("gameOver").style.display = "none";
  document.getElementById("boxContainer").style.display = "grid";
  document.getElementById("storyBox").style.display = "none";
  document.querySelector("#startScreen h2").innerText = "Pilih satu box";

  createBoxes();
  document.getElementById("startScreen").style.display = "flex";

  updateHP();
  loadQuestion();
  switchVideo("efek_diam.mp4", true, 1);
}

// ================= START =================
switchVideo("efek_diam.mp4", true, 1);
updateHP();
loadQuestion();

function startGame() {
  document.getElementById("startScreen").style.display = "none";

  // pakai soal dari cerita
  questions.length = 0;
  selectedStory.questions.forEach(q => questions.push(q));

  // shuffle soal
  questions.sort(() => Math.random() - 0.5);

  currentQuestion = 0;

  loadQuestion();
}

createBoxes();

</script>

<div id="gameOver" style="display:none;">
  <div id="overlay"></div>

  <div id="popupBox">
    <h2 id="resultText">Kamu Menang!</h2>
    <button onclick="restartGame()">Main Lagi</button>
  </div>
</div>
