<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tarik Tambang PAI</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:'Fredoka',sans-serif;
  background:linear-gradient(135deg,#f8f9fa,#dee2e6);
  margin:0;

  min-height:100vh;          /* kunci utama */
  display:flex;
  flex-direction:column;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:flex-start; /* ini kunci */
}

/* TITLE */
h1{
  margin:15px 0 5px;
  text-align: center;
  background:linear-gradient(to right,#3a86ff,#ff006e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* AREA */
.tug{
  position:relative;
  height:90px;
  width:100%;
  overflow:hidden;
}

/* GROUP YANG GERAK */
#game-area{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  gap: 0;
  transition:0.15s linear;
  will-change: transform;
}

/* PLAYER */
.player{
  width:70px;
  position: relative;
  z-index: 2;
}

/* biru masuk ke rope */
.left-player{
  margin-right:-10px;
}

/* merah masuk ke rope */
.right-player{
  margin-left:-10px;
  transform:scaleX(-1);
}

/* ROPE */
#rope{
  width:300px; /* 🔥 panjang rope */
  height:10px;
  background:#c19a6b;
  position:relative;
  border-radius:5px;
  top: 15px;
}

/* MARKER */
#marker{
  position:absolute;
  left:47%;
  top:-6px;
  width:18px;
  height:18px;
  background:gold;
  border-radius:50%;
  transform:translateX(-50%);
}

.player, #rope, #marker{
  will-change: transform;
  transform: translateZ(0);
}

/* CENTER LINE */
#center-line{
  position:absolute;
  left:50%;
  top: 25%;
  height:60%;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.3;
}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  margin:10px;
  display:inline-block;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:100%;
  max-width:320px;
  text-align: center;
  overflow:visible; /* 🔥 biar header nyatu */   
  transition: 0.2s;
  position: relative;
}

/* HEADER */
.header{
  color:white;
  font-size:30px;
  font-weight:bold;
  padding:20px;
  text-align: center;
}

.blue{ background:#3b82f6; }
.red{ background:#ff006e; }

/* BODY */
.body{
  padding:15px;
}

.answer{
  background:#eee;
  padding:20px;
  border-radius:12px;
  margin:15px 0;
  border:2px solid transparent;
  transition:0.3s;

  font-size:32px;       /* biar gede */
  font-weight: bold;
  height:20px;      /* ini kunci: tinggi */
  display:flex;
  align-items:center;
  justify-content:center;
  overflow: hidden;
  max-width: 520px; /* sesuaikan dengan jawaban terbesar */
  gap: 12px; /* jarak antara jawaban dan tombol */
}

/* KEYPAD */
.keypad{
  display:grid;
  grid-template-columns:repeat(2,1fr); /* 🔥 jadi 2 kolom */
  gap:10px;
}

.keypad button{
  font-size:24px;
  font-weight:bold;
  border:none;
  border-radius:16px;
  padding:20px;
  cursor:pointer;
  min-height: 70px; /* kunci utama: tinggi tombol */
  min-width: 70px;
  touch-action:manipulation;
  transition: 0.1s;
}

/* efek tekan */
.keypad button:active{
  transform:scale(0.95);
}

.keypad.locked button{
  background:#ccc !important;
  color:#666;
  cursor:not-allowed;
  transform:none;
}

.ok{background:#00ff88;}
.del{background:#ff4d4d;color:white;}

.win{
  position:fixed;
  inset:0;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wrapper{
  display:flex;
  justify-content:space-between; /* ini kunci */
  align-items:flex-start;
  padding:0 10px; /* jarak dari tepi layar */
  margin:20px auto;
  margin-top: -10px;
  margin-bottom: 10px;
  flex-wrap:wrap;
  width: 100%;
  max-width: 1200px;
  gap: 40px; /* jarak antar card */
}

@media (max-width: 768px){
  .wrapper{
    flex-direction:column;
    align-items:center;
    gap:20px;
  }
}

.subtitle{
  font-family:'Open Sans', sans-serif;
  color:#000;
  margin: 0 0 10px;
  font-size:16px;
  opacity: 0.7;
  text-align: center;
}

@media (max-height: 700px){
  .tug{
    height:110px;
  }

  .char{
    font-size:35px;
  }
}

.footer{
  padding:5px 0;          /* kecilin tinggi */
  font-size:14px;         /* tetap */
  color:#666;
  text-align:center;
  flex-shrink:0;
  margin-top: auto;
}

/* POPUP OVERLAY */
.start-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* BOX */
.popup-box{
  background:white;
  padding:30px 40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* TEXT */
.popup-box h2{
  margin-bottom:20px;
  font-family:'Open Sans', sans-serif;
}

/* BUTTON */
.popup-box button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#3a86ff;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.popup-box button:hover{
  transform:scale(1.05);
}

/* WIN SCREEN */
.win{
  position:fixed;
  inset:0;
  background:rgba(0, 0, 0, 0.9); /* 🔥 hitam transparan */
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.win.show{
  display:flex;
}

/* TEXT */
#winText{
  color:white;
  font-size:40px;
  margin-bottom:20px;
  text-align:center;
  animation:pop 0.4s ease;
}

/* BUTTON */
.win button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  cursor:pointer;
}

@keyframes pop{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* animasi dasar */
.countdown{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  color:white;
  font-size:80px;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-family:'Fredoka', sans-serif;
  transition:0.2s;
}

/* zoom masuk */
@keyframes zoomPop{
  0%{ transform:scale(0.5); opacity:0; }
  50%{ transform:scale(1.2); }
  100%{ transform:scale(1); opacity:1; }
}

/* GO efek besar */
.go{
  color:#00ff88 !important;
  animation:goBoom 0.5s ease;
}

@keyframes goBoom{
  0%{ transform:scale(0.5); }
  50%{ transform:scale(1.5); }
  100%{ transform:scale(1); }
}

/* screen shake */
@keyframes shake{
  0%{ transform:translate(0,0); }
  25%{ transform:translate(5px,-5px); }
  50%{ transform:translate(-5px,5px); }
  75%{ transform:translate(5px,5px); }
  100%{ transform:translate(0,0); }
}

.mode-title{
  margin-bottom:10px;
  font-size:22px;
  background:linear-gradient(to right,#3a86ff,#ff006e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.mode-list{
  display:grid;
  grid-template-columns:repeat(3,1fr); /* 🔥 5 kolom */
  gap:12px;
  margin-top:20px;
}

.mode-list button{
  background:#f1f1f1;
  border:none;
  border-radius:12px;
  padding:12px;
  cursor:pointer;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  font-family:'Open Sans', sans-serif;
  font-size:13px;
  transition:0.2s;
  color: #222;
}

.mode-list button:hover{
  background:#3a86ff;
  color:white;
  transform:scale(1.05);
}

.mode-list .icon{
  font-size:22px;
  margin-bottom:5px;
}

.mode-popup{
  background:white !important;
}

.mode-popup .popup-box{
  color:#222; /* 🔥 teks jadi hitam */
}

.mode-popup,
.mode-popup *{
  color:#222 !important;
}

@media (max-width: 768px){
  .mode-list{
    grid-template-columns:repeat(3,1fr);
  }
}

@media (max-width: 480px){
  .mode-list{
    grid-template-columns:repeat(2,1fr);
  }
}

.credit{
  margin-top:20px;
  font-size:13px;
  color:#555;
  font-family:'Open Sans', sans-serif;
}

.quiz-center{
  text-align:center;
  margin-top:10px;
  min-height: 140px; /* kunci: tinggi minimum untuk mencegah lompat */
}

#question{
  min-height:50px; /* 🔥 biar tidak dorong layout */
  display:flex;
  align-items:center;
  justify-content:center;
}

.answers{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  max-width:400px;
  margin:10px auto;
  min-height:80px; /* 🔥 penting */
}

.opt{
  background:white;
  padding:14px 12px;
  border-radius:12px;
  font-size: 18px;
}

/* WARNA OPSI */
.optA{background:#3b82f6;color:white;} /* biru */
.optB{background:#22c55e;color:white;} /* hijau */
.optC{background:#f59e0b;color:white;} /* kuning */
.optD{background:#ef4444;color:white;} /* merah */

.team-header{
  padding:12px;
  font-weight:bold;
  color:white;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  font-size:18px;
}

/* warna tim */
.blue{background:#3b82f6;}
.red{background:#ef4444;}

.lock-text{
  position:absolute;        /* 🔥 tidak dorong layout */
  top:-30px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
  color:#ef4444;
  pointer-events:none;
  white-space: nowrap;
  text-shadow:0 2px 5px rgba(0,0,0,0.3);
  z-index: 10;
}

</style>
</head>

<body>

<div class="main">

  <h1>TARIK TAMBANG PAI</h1>

  <p class="subtitle">
    Jawab pertanyaan dengan benar untuk menarik tambang
  </p>

  <div class="tug">
    <!-- GARIS TENGAH (tetap) -->
    <div id="center-line"></div>
    <!-- SEMUA DIGABUNG DI SINI -->
    <div id="game-area">
      <img src="https://drive.google.com/thumbnail?id=1outADLE7ZDBjR-1qk8kH98N4NU7kdGeH"
          class="player left-player">
      <div id="rope">
        <div id="marker"></div>
      </div>
      <img src="https://drive.google.com/thumbnail?id=1X2oMf-WCWbVRheZeLM2mx44gWWWgHJQ8"
          class="player right-player">
    </div>
  </div>

  <div class="quiz-center">
    <h2 id="question"></h2>
    <div class="answers">
        <div id="optA" class="opt optA"></div>
        <div id="optB" class="opt optB"></div>
        <div id="optC" class="opt optC"></div>
        <div id="optD" class="opt optD"></div>
    </div>
  </div>

  <div class="wrapper">
    <!-- TIM BIRU -->
    <div class="card">
        <div class="team-header blue">TIM BIRU</div>
        <div class="lock-text" id="lockB"></div> <!-- 🔥 ini baru -->
        <div class="body">
            <div id="kB" class="keypad"></div>
        </div>
    </div>
    <!-- TIM MERAH -->
    <div class="card">
        <div class="team-header red">TIM MERAH</div>
        <div class="lock-text" id="lockR"></div> <!-- 🔥 ini baru -->
        <div class="body">
            <div id="kR" class="keypad"></div>
        </div>
    </div>
  </div>

  <div id="win" class="win">
    <h1 id="winText"></h1>
    <button onclick="location.reload()">Main Lagi</button>
  </div>

</div>

<footer class="footer">
  © 2026 bangudin.my.id All right reserved
</footer>

<div id="mode-popup" class="start-popup mode-popup" style="display: flex;">
  <div class="popup-box">
    <h1 class="mode-title">TARIK TAMBANG PAI</h1>
    <h2>Pilih Materi Permainan</h2>

    <div class="mode-list">

        <button onclick="selectMode('aqidah')">
            <div class="icon">🕌</div>
            <div>Aqidah</div>
        </button>

        <button onclick="selectMode('akhlaq')">
            <div class="icon">😊</div>
            <div>Akhlak</div>
        </button>

        <button onclick="selectMode('fiqih')">
            <div class="icon">🧎</div>
            <div>Fiqih</div>
        </button>

        <button onclick="selectMode('arab')">
            <div class="icon">📖</div>
            <div>Bahasa Arab</div>
        </button>

        <button onclick="selectMode('tarikh')">
            <div class="icon">📜</div>
            <div>Tarikh</div>
        </button>

        <button onclick="selectMode('quran')">
            <div class="icon">📖</div>
            <div>Al Qur'an</div>
        </button>

        <button onclick="selectMode('hadits')">
            <div class="icon">🗣️</div>
            <div>Hadits</div>
        </button>

        <button onclick="selectMode('kemuh')">
             <div class="icon">🧠</div>
            <div>Kemuhammadiyahan</div>
        </button>

        <button onclick="selectMode('campur')">
            <div class="icon">🎯</div>
            <div>Campuran</div>
        </button>

        </div>

    <div class="credit">
      <div>credit : bangudin.my.id                                  📷 @hnnnzzzz_</div>
    </div>
  </div>
</div>

<div id="start-popup" class="start-popup" style="display:none;">
  <div class="popup-box">
    <h2>Sudah siap memulai ?</h2>
    <button onclick="startGame()">GASSS!!!</button>
  </div>
</div>

<div id="countdown" class="countdown">3</div>

<script src="bank-soal-pai/aqidah.js"></script>
<script src="bank-soal-pai/akhlak.js"></script>
<script src="bank-soal-pai/fiqih.js"></script>
<script src="bank-soal-pai/arab.js"></script>
<script src="bank-soal-pai/tarikh.js"></script>
<script src="bank-soal-pai/quran.js"></script>
<script src="bank-soal-pai/hadits.js"></script>
<script src="bank-soal-pai/kemuh.js"></script>
<script src="bank-soal-pai/index.js"></script>

<script>

let gameMode = "aqidah";

function selectMode(mode){
  gameMode = mode;
  console.log("Mode dipilih:", mode); // debug
  document.getElementById("mode-popup").style.display = "none";
  document.getElementById("start-popup").style.display = "flex";
}

function startCountdown(){
  let sequence = ["3", "2", "1", "GO...!!!"];
  let index = 0;
  let el = document.getElementById("countdown");

  el.style.display = "flex";
  el.textContent = sequence[index];
  el.style.animation = "zoomPop 0.4s";

  let interval = setInterval(()=>{
    index++;

    if(index < sequence.length){

      el.textContent = sequence[index];
      el.classList.remove("go");
      el.style.animation = "zoomPop 0.4s";

      // 🔥 khusus GO
      if(sequence[index] === "GO...!!!"){
        el.classList.add("go");

        // screen shake
        document.body.style.animation = "shake 0.3s";
        setTimeout(()=>document.body.style.animation="",300);

        // karakter "siap narik"
        let players = document.querySelectorAll(".player");
        players.forEach(p=>{
          p.style.transform = p.classList.contains("right-player")
            ? "scaleX(-1) scale(1.1)"
            : "scale(1.1)";
          setTimeout(()=>p.style.transform = p.classList.contains("right-player")
            ? "scaleX(-1)"
            : "",200);
        });
      }

    } else {
      clearInterval(interval);
      el.style.display = "none";
      initGame();
    }

  }, 1000);
}

function startGame(){
  document.getElementById("start-popup").style.display = "none";
  startCountdown();
}

let current;
let answered=false;
let lockBlue = false;
let lockRed = false;
let lockTimerBlue = null;
let lockTimerRed = null;

function newQuestion(){
  answered = false;

  let mapSoal = {
    aqidah,
    akhlaq,
    fiqih,
    arab,
    tarikh,
    quran,
    hadits,
    kemuh
  };

  let pool;

  if(gameMode === "campur"){
    pool = semuaSoal;
  } else {
    pool = mapSoal[gameMode];
  }

  if(!pool){
    console.warn("Mode tidak valid:", gameMode);
    pool = aqidah; // fallback biar tetap jalan
  }

  current = pool[Math.floor(Math.random()*pool.length)];

  document.getElementById("question").textContent = current.q;
  document.getElementById("optA").textContent = "A. " + current.A;
  document.getElementById("optB").textContent = "B. " + current.B;
  document.getElementById("optC").textContent = "C. " + current.C;
  document.getElementById("optD").textContent = "D. " + current.D;
}

function answer(choice,team){
  if(answered) return;

  // 🔒 cek lock
  if(team==="blue" && lockBlue) return;
  if(team==="red" && lockRed) return;

  let isCorrect = choice === current.correct;

  // ambil card tim
  let card = team==="blue"
    ? document.querySelector("#kB").closest(".card")
    : document.querySelector("#kR").closest(".card");

    if(isCorrect){
        answered = true;

        resetLock(); // 🔥 tambahin ini

        card.style.border = "2px solid limegreen";

        move(team);

        setTimeout(()=>{
            card.style.border = "none";
            newQuestion();
        }, 500);
    } else {

    // ❌ SALAH → merah
    card.style.border = "2px solid red";

    // 🔒 lock 4 detik
    if(team==="blue") lockBlue = true;
    else lockRed = true;

    startLockCountdown(team);

    setTimeout(()=>{
      card.style.border = "none";

      if(team==="blue") lockBlue = false;
      else lockRed = false;

    }, 4000);
  }
}

let pos=50;

function gcd(a,b){
  while(b!==0){
    let t=b;
    b=a%b;
    a=t;
  }
  return a;
}

function lcm(a,b){
  return (a*b)/gcd(a,b);
}


function initGame(){
  newQuestion();
}

let step = 0;        // posisi sekarang
const maxStep = 5;   // batas menang

let pending = false;

function move(team){
  if(pending) return;
  pending = true;

  requestAnimationFrame(()=>{

    if(team==="blue") step--;   // ⬅️ kiri
    else step++;                // ➡️ kanan

    if(step < -maxStep) step = -maxStep;
    if(step > maxStep) step = maxStep;

    let shift = step * 30;

    document.getElementById("game-area").style.transform =
      `translate(-50%, -50%) translateX(${shift}px)`;

    if(step === -maxStep) win("Biru");
    if(step === maxStep) win("Merah");

    pending = false;
  });
}

function keypad(id,team){
  let el=document.getElementById(id);

  const map = [
    {k:"A", cls:"optA"},
    {k:"B", cls:"optB"},
    {k:"C", cls:"optC"},
    {k:"D", cls:"optD"}
  ];

  map.forEach(x=>{
    let b=document.createElement("button");
    b.textContent=x.k;        // 🔥 hanya huruf
    b.className=x.cls;        // 🔥 warna sama
    b.onclick=()=>answer(x.k,team);
    el.appendChild(b);
  });
}

function win(name){
  document.getElementById("winText").textContent =
    "TIM " + name.toUpperCase() + " MENANG !!!!";

  document.getElementById("win").classList.add("show");

  // 🎉 CONFETTI
  confetti({
    particleCount: 60,
    spread: 60,
    origin: { y: 0.6 }
  });
}

keypad("kB","blue");
keypad("kR","red");

function startLockCountdown(team){

  let el = team==="blue"
    ? document.getElementById("lockB")
    : document.getElementById("lockR");

  let keypad = team==="blue"
    ? document.getElementById("kB")
    : document.getElementById("kR");

  let time = 4;

  el.textContent = "Tunggu " + time;

  // 🔥 disable tombol
  keypad.classList.add("locked");

  let interval = setInterval(()=>{
    time--;

    if(time > 0){
      el.textContent = "Tunggu " + time;
    } else {
      el.textContent = "";
      keypad.classList.remove("locked");
      clearInterval(interval);
    }
  },1000);

  // 🔥 simpan interval
  if(team==="blue") lockTimerBlue = interval;
  else lockTimerRed = interval;
}

function resetLock(){

  // 🔵 BLUE
  if(lockTimerBlue){
    clearInterval(lockTimerBlue);
    lockTimerBlue = null;
    document.getElementById("lockB").textContent = "";
    document.getElementById("kB").classList.remove("locked");
    lockBlue = false;
  }

  // 🔴 RED
  if(lockTimerRed){
    clearInterval(lockTimerRed);
    lockTimerRed = null;
    document.getElementById("lockR").textContent = "";
    document.getElementById("kR").classList.remove("locked");
    lockRed = false;
  }
}

</script>

</body>
</html>
