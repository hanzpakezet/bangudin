  <script>

// ===== DATA =====
const KEYS={books:'lib_books',students:'lib_students',borrows:'lib_borrows',visitors:'lib_visitors',settings:'lib_settings'};
const API_URL = "https://script.google.com/macros/s/AKfycbxnYydiZNlKpRP1bGlt-FiZk_iDObNS_Pxa9U1lZt-ajK7uuAB3nq75ccOxeIBXzwJ8/exec";
let studentsCache = [];
let booksCache = [];

function load(k){try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}}
function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
function getSettings(){return load(KEYS.settings)||{libName:'PERPUSTAKAAN INSIMA',schoolName:'SMA INSIMA',address:'',phone:'',finePerDay:1000,loanDays:7,maxBorrow:3}}
function saveSettings(s){save(KEYS.settings,s)}

function initData(){

  const bookTitles=['Laskar Pelangi','Bumi Manusia','Negeri 5 Menara','Ayat-Ayat Cinta','Perahu Kertas','Dilan 1990','Filosofi Teras','Atomic Habits','Sapiens','Outliers','Thinking Fast and Slow','Rich Dad Poor Dad','How to Win Friends','A Brief History of Time','Guns Germs and Steel','The Body','Sang Pemimpi','Edensor','Maryamah Karpov','Padang Bulan','Cinta di Dalam Gelas','Ranah 3 Warna','Api Tauhid','Bidadari Bermata Bening','Bulan Terbelah di Langit Amerika','99 Cahaya di Langit Eropa','Tenggelamnya Kapal Van Der Wijck','Di Bawah Lindungan Ka\'bah','Siti Nurbaya','Salah Asuhan','Layar Terkembang','Belenggu','Atheis','Harimau Harimau','Merantau ke Deli','Sengsara Membawa Nikmat','Azab dan Sengsara','Student Hidjo','Surat Cinta Untuk Starla','Kamu Terlalu Banyak Bercanda','Konspirasi Alam Semesta','Sebuah Seni Untuk Bersikap Bodo Amat','Berani Tidak Disukai','Mindset','Grit','Deep Work','Digital Minimalism','The Subtle Art','Ikigai','The Power of Habit','Quiet','Dune','Foundation','Neuromancer','Snow Crash','The Martian','Project Hail Mary','Ender\'s Game','Hyperion','Ringworld','Matematika Dasar','Fisika Modern','Kimia Organik','Biologi Sel','Kalkulus','Aljabar Linear','Statistika','Probabilitas','Geometri','Trigonometri','Bahasa Indonesia','Bahasa Inggris','Bahasa Jepang','Bahasa Arab','Bahasa Mandarin','Sejarah Indonesia','Sejarah Dunia','Geografi','Sosiologi','Ekonomi','PKN','Pendidikan Agama','Seni Budaya','Prakarya','Informatika','PJOK','Bimbingan Konseling','Ensiklopedia Anak','Atlas Dunia','Kamus Besar','Antologi Puisi','Kumpulan Cerpen','Novel Remaja','Dongeng Nusantara','Legenda Rakyat','Fabel Dunia','Cerita Rakyat','Pantun dan Peribahasa','Biografi Tokoh','Motivasi Remaja','Panduan Belajar'];
  const books=[];
  for(let i=0;i<100;i++){const st=Math.floor(Math.random()*8)+2;books.push({id:'BK'+String(i+1).padStart(4,'0'),isbn:'978-'+String(Math.floor(Math.random()*9e9)+1e9),title:bookTitles[i]||`Buku ${i+1}`,author:authors[i%authors.length],publisher:publishers[i%publishers.length],year:2015+Math.floor(Math.random()*10),category:categories[i%categories.length],rack:racks[Math.floor(Math.random()*racks.length)],rackRow:Math.floor(Math.random()*5)+1,stockTotal:st,stockAvailable:st,stockBorrowed:0})}
  const classes=['X-A','X-B','X-C','XI-A','XI-B','XI-C','XII-A','XII-B','XII-C','XII-D'];
  const firstNames=['Andi','Budi','Citra','Dewi','Eka','Fajar','Gita','Hadi','Indah','Joko','Kartika','Lukman','Maya','Nanda','Omar','Putri','Qori','Rina','Siti','Taufik','Umar','Vina','Wawan','Xena','Yuni','Zahra','Agus','Bayu','Cahya','Dian','Erwin','Fitri','Galih','Hana','Irfan','Jasmine','Kemal','Laila','Miftah','Nisa','Okta','Prasetyo','Quinsha','Rizky','Sari','Teguh','Ulfah','Vero','Widi','Yusuf'];
  const lastNames=['Pratama','Santoso','Nurhaliza','Lestari','Saputra','Hidayat','Kusuma','Wijaya','Rahayu','Arifin','Permata','Susanto','Maharani','Putra','Ramadhan','Anggraini','Setiawan','Cahyani','Nugroho','Wibowo'];
  const students=[];
  for(let i=0;i<50;i++){students.push({nis:'2024'+String(i+1).padStart(4,'0'),name:firstNames[i]+' '+lastNames[i%lastNames.length],class:classes[i%classes.length],gender:i%3===0?'Perempuan':'Laki-laki',phone:'08'+String(Math.floor(Math.random()*9e9)+1e9),active:true})}
  const borrows=[];const today=new Date('2026-06-07');
  for(let i=0;i<25;i++){const student=students[i%students.length];const book=books[i%books.length];const daysAgo=Math.floor(Math.random()*14)+1;const bd=new Date(today);bd.setDate(today.getDate()-daysAgo);const dd=new Date(bd);dd.setDate(bd.getDate()+7);let status='Dipinjam';if(dd<today)status='Terlambat';else if((dd-today)/864e5<=2)status='Jatuh Tempo';book.stockAvailable--;book.stockBorrowed++;borrows.push({id:'TR'+String(i+1).padStart(4,'0'),studentNis:student.nis,studentName:student.name,bookId:book.id,bookTitle:book.title,borrowDate:bd.toISOString().split('T')[0],dueDate:dd.toISOString().split('T')[0],returnDate:null,status,fine:status==='Terlambat'?Math.ceil((today-dd)/864e5)*1000:0,finePaid:false})}
  for(let i=25;i<45;i++){const student=students[i%students.length];const book=books[(i+20)%books.length];const daysAgo=Math.floor(Math.random()*30)+10;const bd=new Date(today);bd.setDate(today.getDate()-daysAgo);const dd=new Date(bd);dd.setDate(bd.getDate()+7);const rd=Math.floor(Math.random()*5);const ret=new Date(dd);ret.setDate(dd.getDate()+rd);const fine=rd>0?rd*1000:0;borrows.push({id:'TR'+String(i+1).padStart(4,'0'),studentNis:student.nis,studentName:student.name,bookId:book.id,bookTitle:book.title,borrowDate:bd.toISOString().split('T')[0],dueDate:dd.toISOString().split('T')[0],returnDate:ret.toISOString().split('T')[0],status:'Selesai',fine,finePaid:Math.random()>.4})}
  const purposes=['Membaca','Mengerjakan Tugas','Mencari Referensi','Belajar Mandiri','Diskusi Kelompok'];const visitors=[];
  for(let i=0;i<30;i++){const student=students[i%students.length];const da=Math.floor(Math.random()*7);const vd=new Date(today);vd.setDate(today.getDate()-da);const h=7+Math.floor(Math.random()*6);visitors.push({id:'V'+String(i+1).padStart(4,'0'),name:student.name,class:student.class,date:vd.toISOString().split('T')[0],timeIn:`${String(h).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`,timeOut:`${String(h+1+Math.floor(Math.random()*2)).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`,purpose:purposes[Math.floor(Math.random()*purposes.length)]})}
  save(KEYS.books,books);save(KEYS.students,students);save(KEYS.borrows,borrows);save(KEYS.visitors,visitors);
}
initData();

// MENU LOGOUT
function toggleProfileMenu(){
  document
    .getElementById('profile-menu')
    .classList
    .toggle('hidden');
}

function logout(){
  localStorage.removeItem(
    'isLoggedIn'
  );
  location.reload();
}

document.addEventListener(
'click',
function(e){
  const menu =
    document.getElementById(
      'profile-menu'
    );
  if(
    !e.target.closest('#profile-menu')
    &&
    !e.target.closest(
      '[onclick="toggleProfileMenu()"]'
    )
  ){
    menu?.classList.add(
      'hidden'
    );
  }
});

// ----------------------------------------- JS CRUD ---------------------------------

async function getBooks() {
  const res = await fetch(API_URL + "?sheet=Buku");
  const json = await res.json();
  const rows = json.data;

  return rows.slice(1).map(r => ({
    id: r[0],
    title: r[1],
    isbn: r[2],
    author: r[3],
    publisher: r[4],
    year: r[5],
    category: r[6],
    rack: r[7],
    stockTotal: Number(r[8]),
    stockAvailable: Number(r[9])
  }));
}

async function getStudents() {
  const res = await fetch(API_URL + "?sheet=Siswa");
  const json = await res.json();
  const rows = json.data;
  return rows.slice(1).map(r => ({
    nis: r[0],
    name: r[1],
    class: r[2],
    gender: r[3],
    active: r[4] === 'Aktif'
  }));
}

async function getBorrows() {
  const res = await fetch(API_URL + "?sheet=Peminjaman");
  const json = await res.json();

  return json.data
    .slice(1)
    .filter(r => r[0])   // hanya ambil yang punya ID transaksi
    .map(r => ({
      transactionId: r[0],
      bookId: r[1],
      nis: r[2],
      studentName: r[3],
      bookTitle: r[4],
      borrowDate: r[5],
      dueDate: r[6],
      status: r[7]
    }));
}

async function getVisitors() {
  const res = await fetch(
    API_URL + "?sheet=Pengunjung"
  );
  const json = await res.json();
  return json.data
    .slice(1)
    .filter(r => r[0])
    .map(r => ({
      date: r[0],
      nis: r[1],
      name: r[2],
      class: r[3],
      time: r[4],
      purpose: r[5]
    }));

}

function getToday(){return new Date().toISOString().split('T')[0]}

function toast(msg,type='success'){
  const colors={success:'bg-emerald-600',error:'bg-red-600',warning:'bg-amber-600',info:'bg-primary-600'};
  const el=document.createElement('div');el.className=`toast ${colors[type]} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium`;el.textContent=msg;document.getElementById('toast-container').appendChild(el);setTimeout(()=>el.remove(),3000);
}
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').classList.remove('hidden');lucide.createIcons()}
function closeModal(){document.getElementById('modal').classList.add('hidden')}
function formatDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function formatCurrency(n){return'Rp'+Number(n).toLocaleString('id-ID')}


// LOADER
function showLoader(){
  const loader =
    document.getElementById('page-loader');
  loader.style.width = '30%';
  setTimeout(()=>{
    loader.style.width = '70%';
  },200);
}

function hideLoader(){
  const loader =
    document.getElementById('page-loader');
  loader.style.width = '100%';
  setTimeout(()=>{
    loader.style.width = '0%';
  },300);
}

async function apiRequest(payload){
  showLoader();
  try{
    return await fetch(API_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    });
  }finally{
    hideLoader();
  }
}

function showTableLoading(page){
  const el =
    document.getElementById('page-' + page);
  if(!el) return;
  el.innerHTML = `
  <div class="flex flex-col items-center justify-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-200 border-t-blue-600"></div>
    <p class="mt-3 text-sm text-gray-500">
      Memuat data...
    </p>
  </div>`;
}

function updateClock(){const now=new Date();document.getElementById('clock-time').textContent=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('clock-date').textContent=now.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
setInterval(updateClock,1000);updateClock();

// Notifications
function toggleNotif(){const dd=document.getElementById('notif-dropdown');dd.classList.toggle('hidden');if(!dd.classList.contains('hidden'))renderNotifications()}
async function renderNotifications(){
  const borrows = await getBorrows();
  const settings = getSettings();
  const overdue = borrows.filter(b=>b.status==='Terlambat');
  const dueSoon = borrows.filter(b=>b.status==='Jatuh Tempo');
  const unpaidFines = borrows.filter(b=>b.fine>0&&!b.finePaid);
  let items=[];
  overdue.forEach(b=>items.push({text:`${b.studentName} - "${b.bookTitle}" terlambat`,type:'red',page:'borrow'}));
  dueSoon.forEach(b=>items.push({text:`${b.studentName} - "${b.bookTitle}" jatuh tempo`,type:'yellow',page:'borrow'}));
  unpaidFines.slice(0,5).forEach(b=>items.push({text:`Denda ${b.studentName}: ${formatCurrency(b.fine)}`,type:'orange',page:'fines'}));
  const list=document.getElementById('notif-list');
  if(!items.length){list.innerHTML='<p class="text-sm text-gray-400 p-3 text-center">Tidak ada notifikasi</p>';return}
  list.innerHTML=items.slice(0,10).map(i=>`<button onclick="navigateTo('${i.page}');toggleNotif()" class="w-full text-left p-2.5 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700 text-sm flex items-start gap-2"><span class="w-2 h-2 rounded-full mt-1.5 shrink-0 bg-${i.type}-500"></span><span>${i.text}</span></button>`).join('');
}
document.addEventListener('click',e=>{if(!e.target.closest('#notif-dropdown')&&!e.target.closest('[aria-label="Notifikasi"]'))document.getElementById('notif-dropdown').classList.add('hidden')});

async function renderSidebar(){

  const nav=document.getElementById('sidebar-nav');

  nav.innerHTML=menuItems.map(m=>{
    const badge=m.badge?m.badge():0;
    return `
      <button class="sidebar-item w-full text-left px-3 py-2 flex items-center gap-3 text-[13px] font-medium text-white/70 rounded-lg" data-page="${m.id}">
        <i data-lucide="${m.icon}" class="w-4 h-4"></i>
        <span class="flex-1">${m.label}</span>
        ${badge?`<span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">${badge}</span>`:''}
      </button>
    `;
  }).join('');

  lucide.createIcons();

  nav.querySelectorAll('.sidebar-item').forEach(btn=>
    btn.addEventListener('click',()=>navigateTo(btn.dataset.page))
  );

  const borrows = await getBorrows();

  const overdue = borrows.filter(
    b => b.status === 'Terlambat'
  ).length;

  const nb=document.getElementById('notif-badge');
  nb.textContent=overdue||'';
  nb.classList.toggle('hidden',!overdue);

}

let currentPage='dashboard';
function navigateTo(page){
  currentPage=page;
  document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('page-heading').textContent=menuItems.find(m=>m.id===page)?.label||'';
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  renderPage(page);toggleSidebar(true);
}

function toggleSidebar(forceClose){
  const sb=document.getElementById('sidebar-el'),ov=document.getElementById('mobile-overlay');
  if(forceClose===true){sb.classList.remove('open');ov.classList.add('hidden')}
  else{sb.classList.toggle('open');ov.classList.toggle('hidden')}
}

function showLoader(){
  const loader =
    document.getElementById('page-loader');
  if(loader)
    loader.style.width = '70%';
}

function hideLoader(){
  const loader =
    document.getElementById('page-loader');
  if(!loader) return;
  loader.style.width = '100%';
  setTimeout(()=>{
    loader.style.width = '0%';
  },300);
}

async function renderPage(page){
  showLoader();
  // showTableLoading(page); // render dengan loading memuat data
  const r={
    dashboard:renderDashboard,
    books:renderBooks,
    students:renderStudents,
    borrow:renderBorrow,
    return:renderReturn,
    history:renderHistory,
    visitors:renderVisitors,
    stats:renderStats,
    fines:renderFines,
    settings:renderSettings
  };
  try{
    if(r[page])
      await r[page]();
  }finally{
    hideLoader();
  }
}

async function saveBook(e,id){
  e.preventDefault();
  const btn =
    e.target.querySelector(
        'button[type="submit"]'
    );
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    showLoader();
    await new Promise(
    requestAnimationFrame
    );

  const f = new FormData(e.target);

  let payload;

  if(id){

    const books = await getBooks();
    const oldBook = books.find(
    b => b.id === id
    );

    payload = {
    action : "update",
    sheet : "Buku",
    data : [
        id,
        f.get('title'),
        f.get('isbn'),
        f.get('author'),
        f.get('publisher'),
        f.get('year'),
        f.get('category'),
        f.get('rack'),
        Number(f.get('stockTotal')),
        oldBook.stockAvailable
    ]
    };

    } else {

  const books = await getBooks();

  const category = f.get('category');

  const categoryCode = {
    'Fiksi':'FS',
    'Non-Fiksi':'NF',
    'Sejarah':'SJ',
    'Sains':'SN',
    'Matematika':'MT',
    'Bahasa':'BH',
    'Agama':'AG',
    'Teknologi':'TK',
    'Seni':'SE',
    'Olahraga':'OR'
  };

  const sameCategory = books.filter(
    b => b.id?.startsWith(
      categoryCode[category]
    )
  );

  const lastNumber = sameCategory.length
    ? Math.max(
        ...sameCategory.map(
          b => Number(
            b.id.substring(2)
          )
        )
      )
    : 0;

  const newId =
    categoryCode[category]
    +
    String(lastNumber + 1)
      .padStart(4,'0');

    payload = {
      action : "add",
      sheet : "Buku",
      data : [
        newId,
        f.get('title'),
        f.get('isbn'),
        f.get('author'),
        f.get('publisher'),
        f.get('year'),
        f.get('category'),
        f.get('rack'),
        Number(f.get('stockTotal')),
        Number(f.get('stockTotal'))
    ]
    };

  }

  await fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify(payload)
  });

  booksCache = await getBooks();

  hideLoader();
  closeModal();

  toast(
    id
      ? 'Buku berhasil diperbarui, tunggu refresh'
      : 'Buku berhasil ditambahkan, tunggu refresh'
  );

  setTimeout(async()=>{
    await renderBooks();
  },1000);

}

async function saveBorrow(e){

    e.target.querySelector(
        'button[type="submit"]'
    );

    btn.textContent = 'Menyimpan...';
    showLoader();
    await new Promise(
    requestAnimationFrame
    );

  const f=new FormData(e.target);
  const students = await getStudents();
  const books = await getBooks();
  const borrows = await getBorrows();
  const settings = getSettings();
  const student=students.find(s=>s.nis===f.get('nis'));
  const book=books.find(b=>b.id===f.get('bookId'));
    if(!student||!book){
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Simpan';

  const activeByStudent=borrows.filter(b=>b.studentNis===student.nis&&b.status!=='Selesai').length;

  const transactionId =

    const res = await fetch(API_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            action:'add',
            sheet:'Peminjaman',
            data:[
                transactionId,
                book.id,
                student.nis,
                student.name,
                book.title,
                f.get('borrowDate'),
                f.get('dueDate'),
                'Dipinjam'
            ]
        })
    });

    const visitors = await getVisitors();
    const alreadyVisited =
    visitors.some(v =>
        v.nis === student.nis &&
        v.date === getToday()
    );

    if(!alreadyVisited){
    const now = new Date();
    const currentTime =
        String(now.getHours()).padStart(2,'0')
        + ':' +
        String(now.getMinutes()).padStart(2,'0');

    await fetch(API_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{
        'Content-Type':'application/json'
        },
        body:JSON.stringify({
        action:'add',
        sheet:'Pengunjung',
        data:[
            getToday(),
            student.nis,
            student.name,
            student.class,
            currentTime,
            'Meminjam Buku'
        ]
        })
    });
    }

    console.log(res);

    await fetch(API_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            action:'update',
            sheet:'Buku',
            data:[
            book.id,
            book.title,
            book.isbn,
            book.author,
            book.publisher,
            book.year,
            book.category,
            book.rack,
            book.stockTotal,
            book.stockAvailable - 1
            ]
        })
    });

    booksCache = await getBooks();
    hideLoader();
    closeModal();
        console.log("BOOK", book);
        console.log("STUDENT", student);
        console.log("TRANSACTION", transactionId);
        toast('Peminjaman berhasil, Tunggu data refresh');

async function returnBook(transactionId){

    const btn =
        document.getElementById(
            `return-${transactionId}`
        );

        btn.disabled = true;
        btn.textContent =
        'Mengembalikan...';
        showLoader();
        await new Promise(
        requestAnimationFrame
    );

    try  {
  const borrows = await getBorrows();
  const books = await getBooks();
  const settings = getSettings();

  const borrow = borrows.find(
    b => b.transactionId === transactionId
  );

  if(!borrow){
    toast('Data peminjaman tidak ditemukan','error');
    return;
  }

  const today = new Date(getToday());
  const late = Math.max(
    0,
    Math.ceil(
      (today - new Date(borrow.dueDate))
      / 864e5
    )
  );

  const fine = late * settings.finePerDay;
  await fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{
        'Content-Type':'application/json'
    },
    body:JSON.stringify({
        action:'add',
        sheet:'Riwayat',
        data:[
        borrow.studentName,
        borrow.bookId,
        borrow.bookTitle,
        borrow.borrowDate,
        getToday(),
        fine
        ]
    })
    });

    if(fine > 0){
        const students = await getStudents();
        const member = students.find(
            s => s.nis === borrow.nis
        );

        await fetch(API_URL,{
            method:'POST',
            mode:'no-cors',
            headers:{
            'Content-Type':'application/json'
            },
            body:JSON.stringify({
            action:'add',
            sheet:'Denda',
            data:[
                borrow.transactionId,
                borrow.nis,
                borrow.studentName,
                member?.class || '-',
                borrow.bookTitle,
                fine,
                'Belum Dibayar'
            ]
            })
        });
    }

  await fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      action:'update',
      sheet:'Peminjaman',
      data:[
        borrow.transactionId,
        borrow.bookId,
        borrow.nis,
        borrow.studentName,
        borrow.bookTitle,
        borrow.borrowDate,
        borrow.dueDate,
        'Selesai'
      ]
    })
  });

  const book = books.find(
    b => b.id === borrow.bookId
  );

  if(book){
    await fetch(API_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{
        'Content-Type':'application/json'
        },
        body:JSON.stringify({
        action:'update',
        sheet:'Buku',
        data:[
            book.id,
            book.title,
            book.isbn,
            book.author,
            book.publisher,
            book.year,
            book.category,
            book.rack,
            book.stockTotal,
            book.stockAvailable + 1
        ]
        })
    });
    }

    booksCache = await getBooks();

  toast(
    late
      ? `Buku dikembalikan. Denda ${formatCurrency(fine)}`
      : 'Buku berhasil dikembalikan'
  );

  setTimeout(async()=>{
    await renderReturn();
    await renderBorrow();
    await renderDashboard();
  },1000);

  hideLoader();

  } catch(err){
        console.error(err);
        hideLoader();
        btn.disabled = false;
        btn.textContent = 'Kembalikan';
        toast(
            'Gagal mengembalikan buku',
            'error'
        );

    }
}

async function getHistory() {
  const res = await fetch(API_URL + "?sheet=Riwayat");
  const json = await res.json();
  const rows = json.data;
  return rows
    .slice(1)
    .filter(r => r[0])
    .map(r => ({
        studentName: r[0],
        bookId: r[1],
        bookTitle: r[2],
        borrowDate: r[3],
        returnDate: r[4],
        fine: Number(r[5] || 0)
    }));
}

async function renderFines(){
  const fines = await getFines();
    const borrows = await getBorrows();
    const settings = getSettings();

    const today = new Date();
    today.setHours(0,0,0,0);

    const activeLate = borrows
    .filter(b => b.status !== 'Selesai')
    .map(b => {

        const due = new Date(b.dueDate);
        due.setHours(0,0,0,0);

        const lateDays = Math.floor(
        (today - due) / 86400000
        );

        if(lateDays <= 0) return null;

        return {
        transactionId: b.transactionId,
        nis: b.nis,
        studentName: b.studentName,
        bookTitle: b.bookTitle,
        fine: lateDays * settings.finePerDay,
        status: 'Terlambat'
        };
    })
    .filter(Boolean);

    const unpaid = fines.filter(
    f => f.status === 'Belum Dibayar'
    );

    const paid = fines.filter(
    f => f.status === 'Sudah Dibayar'
    );

    const allActiveFines = [
    ...activeLate,
    ...unpaid
    ];

    const totalUnpaid =
    allActiveFines.reduce(
        (s,f)=>s+f.fine,
        0
    );

async function payFine(transactionId){
  await fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      action:'payFine',
      sheet:'Denda',
      transactionId
    })
  });
  toast('Denda berhasil dibayar, tunggu refresh');
  setTimeout(async()=>{
    await renderFines();
  },1000);
}

async function getFines() {
    const res = await fetch(API_URL + "?sheet=Denda");
    const json = await res.json();
    return json.data
        .slice(1)
        .filter(r => r[0])
        .map(r => ({
            transactionId: r[0],
            nis: r[1],
            studentName: r[2],
            class: r[3],
            bookTitle: r[4],
            fine: Number(r[5] || 0),
            status: r[6]
    }));
}

function saveLibSettings(e){
  e.preventDefault();const f=new FormData(e.target);const s=getSettings();
  s.libName=f.get('libName');s.schoolName=f.get('schoolName');s.address=f.get('address');s.phone=f.get('phone');
  saveSettings(s);toast('Identitas disimpan, tunggu refresh');renderSidebar();
}
function saveLoanSettings(e){
  e.preventDefault();const f=new FormData(e.target);const s=getSettings();
  s.finePerDay=parseInt(f.get('finePerDay'));s.loanDays=parseInt(f.get('loanDays'));s.maxBorrow=parseInt(f.get('maxBorrow'));
  saveSettings(s);toast('Pengaturan disimpan, tunggu refresh');
}

function exportData(){
  const data={books:getBooks(),students:getStudents(),borrows:getBorrows(),visitors:getVisitors(),settings:getSettings()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`backup-perpustakaan-${getToday()}.json`;a.click();URL.revokeObjectURL(url);toast('Data berhasil diexport');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.books)save(KEYS.books,data.books);
      if(data.students)save(KEYS.students,data.students);
      if(data.borrows)save(KEYS.borrows,data.borrows);
      if(data.visitors)save(KEYS.visitors,data.visitors);
      if(data.settings)save(KEYS.settings,data.settings);
      toast('Data berhasil diimport');renderSidebar();renderPage(currentPage);
    }catch{toast('File tidak valid','error')}
  };reader.readAsText(file);
}

const searchInput = document.getElementById('global-search');
const searchResults = document.getElementById('search-results');

searchInput?.addEventListener('input', async function(){

  const q = this.value.toLowerCase().trim();

  if(!q){
    searchResults.classList.add('hidden');
    return;
  }

  const allBooks = await getBooks();
  const allStudents = await getStudents();

  const books = allBooks
    .filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.id.toLowerCase().includes(q)
    )
    .slice(0,5);

  const students = allStudents
    .filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.nis.includes(q)
    )
    .slice(0,5);

  let html = '';

  if(books.length){
    html +=
      `<div class="p-2 text-[10px] text-gray-400 uppercase font-semibold">
        Buku
      </div>`
      +
      books.map(b=>`
        <button
          class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 dark:hover:bg-slate-700"
          onclick="navigateTo('books');searchResults.classList.add('hidden');searchInput.value=''">
          ${b.title}
          <span class="text-xs text-gray-400">${b.id}</span>
        </button>
      `).join('');
  }

  if(students.length){
    html +=
      `<div class="p-2 text-[10px] text-gray-400 uppercase font-semibold">
        Member
      </div>`
      +
      students.map(s=>`
        <button
          class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 dark:hover:bg-slate-700"
          onclick="navigateTo('students');searchResults.classList.add('hidden');searchInput.value=''">
          ${s.name}
          <span class="text-xs text-gray-400">${s.nis}</span>
        </button>
      `).join('');
  }

  if(!html){
    html =
      '<p class="p-3 text-sm text-gray-400">Tidak ditemukan</p>';
  }

  searchResults.innerHTML = html;
  searchResults.classList.remove('hidden');

});

document.addEventListener('click',e=>{
  if(
    !e.target.closest('#global-search') &&
    !e.target.closest('#search-results')
  ){
    searchResults?.classList.add('hidden');
  }
});
